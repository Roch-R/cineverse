<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse thousands of movies on CineVerse. Action, drama, sci-fi, horror, and more in 4K." />
  <title>Movies – CineVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .page-hero {
      padding: 140px 0 60px;
      background: linear-gradient(180deg, rgba(139,47,201,0.1) 0%, transparent 100%);
      border-bottom: 1px solid var(--clr-border-2);
    }
    .filter-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: 99px;
      background: var(--clr-card);
      border: 1px solid var(--clr-border-2);
      color: var(--clr-text-muted);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--clr-primary);
      border-color: var(--clr-primary);
      color: #fff;
    }
    .all-movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo"><span class="logo-c">C</span>ineVerse</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="movies.html" class="nav-link active">Movies</a></li>
        <li><a href="series.html" class="nav-link">Series</a></li>
        <li><a href="originals.html" class="nav-link">Originals</a></li>
        <li><a href="genres.html" class="nav-link">Genres</a></li>
        <li><a href="pricing.html" class="nav-link">Pricing</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-nav btn-sign-in" id="sign-in-btn">Sign In</a>
        <a href="register.html" class="btn-nav btn-start" id="start-btn">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- PROMOTED SPOTLIGHT -->
  <div id="promoted-spotlight"></div>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="container">
      <div class="section-tag">🎬 Library</div>
      <h1 class="section-title" style="margin-top:12px;">All <span class="gradient-text">Movies</span></h1>
      <p class="section-sub" id="movies-subhead">Your movie library</p>
    </div>
  </div>

  <!-- MOVIES LIBRARY -->
  <section class="section">
    <div class="container">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-genre="all" id="filter-all">All Genres</button>
        <button class="filter-btn" data-genre="action" id="filter-action">💥 Action</button>
        <button class="filter-btn" data-genre="drama" id="filter-drama">🎭 Drama</button>
        <button class="filter-btn" data-genre="scifi" id="filter-scifi">🚀 Sci-Fi</button>
        <button class="filter-btn" data-genre="horror" id="filter-horror">👻 Horror</button>
        <button class="filter-btn" data-genre="romance" id="filter-romance">💕 Romance</button>
        <button class="filter-btn" data-genre="thriller" id="filter-thriller">🔪 Thriller</button>
      </div>
      <div class="all-movies-grid" id="all-movies-grid">
        <!-- injected by JS -->
      </div>
    </div>
  </section>

  <footer class="footer" style="margin-top:0;">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:24px 0;">
        <p>© 2026 CineVerse Inc.</p>
        <a href="../index.html" class="btn-outline" style="padding:8px 20px;font-size:0.85rem;">← Back to Home</a>
      </div>
    </div>
  </footer>

  <script src="../js/store.js"></script>
  <script src="../js/promoted-spotlight.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/mini-player.js"></script>
  <script>
    const ALL_MOVIES = CineStore.getByCategory('Movies');

    function buildCard(item) {
      const initials = item.title.split(' ').map(w=>w[0]).slice(0,2).join('');
      const isUpload = !!(CineStore.getById && CineStore.getById(item.id));
      const href = isUpload ? `watch.html?id=${encodeURIComponent(item.id)}` : '#';
      const thumb = item.thumbUrl
        ? `<div style="width:100%;min-height:200px;background-image:url('${String(item.thumbUrl).replace(/'/g,"\\'")}');background-size:cover;background-position:center;position:relative;">
             <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(0,0,0,0.45) 100%);"></div>
           </div>`
        : `<div style="width:100%;min-height:200px;background:linear-gradient(145deg,${item.color}cc,#070710);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;position:relative;">
             <div style="position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.08),transparent 60%);"></div>
             <div style="font-size:2.5rem;font-weight:900;color:rgba(255,255,255,0.9);position:relative;">${initials}</div>
             <div style="font-size:0.68rem;font-weight:600;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:2px;position:relative;">${item.genre}</div>
           </div>`;
      const stats = CineStore.getRatingStats(item.id);
      const ratingTxt = stats.count ? `★ ${stats.avg.toFixed(1)}` : '★ —';
      return `
        <a href="${href}" class="movie-card reveal" data-id="${item.id}" data-genre="${item.genre.toLowerCase()}" style="text-decoration:none;color:inherit;display:block;">
          <div class="card-thumb">
            ${thumb}
            ${item.badge ? `<div class="card-badge">${item.badge}</div>` : ''}
            ${item.promoted ? '<div class="card-badge" style="right:10px;left:auto;background:linear-gradient(135deg,#f5c518,#ff9f1c);color:#0a0612;">★ PROMOTED</div>' : ''}
            <div class="card-overlay"><div class="card-play-btn">▶</div></div>
          </div>
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            <div class="card-meta">
              <span class="card-rating">${ratingTxt}</span>
              <span>·</span><span>${item.year}</span>
              <span>·</span><span>${item.genre}</span>
            </div>
          </div>
        </a>`;
    }

    const grid = document.getElementById('all-movies-grid');
    function emptyHTML(msg) {
      return `
        <div style="grid-column:1/-1;text-align:center;padding:60px 20px;
                    color:var(--clr-text-muted);border:1px dashed var(--clr-border-2);
                    border-radius:16px;background:rgba(255,255,255,0.02);">
          <div style="font-size:2.2rem;margin-bottom:10px;opacity:0.6;">🎬</div>
          <div style="font-weight:700;color:var(--clr-text);margin-bottom:6px;">${msg}</div>
          <div style="font-size:0.85rem;">Upload movies from the admin panel to see them here.</div>
        </div>`;
    }
    const subhead = document.getElementById('movies-subhead');
    function render(genre) {
      const filtered = genre === 'all' ? ALL_MOVIES : ALL_MOVIES.filter(m => (m.genre || '').toLowerCase().includes(genre));
      if (subhead) {
        const n = filtered.length;
        subhead.textContent = n
          ? `${n} ${n === 1 ? 'title' : 'titles'}${genre === 'all' ? '' : ' in this genre'}`
          : 'Your movie library';
      }
      if (!filtered.length) {
        grid.innerHTML = emptyHTML(ALL_MOVIES.length ? 'No movies in this genre' : 'No movies yet');
        return;
      }
      grid.innerHTML = filtered.map(buildCard).join('');
      document.querySelectorAll('.reveal').forEach(el => setTimeout(() => el.classList.add('visible'), 50));
    }

    // Honor ?genre= query param
    const qGenre = (new URLSearchParams(location.search).get('genre') || 'all').toLowerCase();
    const startBtn = document.querySelector(`.filter-btn[data-genre="${qGenre}"]`);
    if (startBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      startBtn.classList.add('active');
      render(qGenre);
    } else {
      render('all');
    }

    document.getElementById('filter-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.genre);
    });
  </script>
</body>
</html>
