<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genres – CineVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .page-hero {
      padding: 140px 0 60px;
      background: linear-gradient(180deg, rgba(196,77,255,0.1) 0%, transparent 100%);
      border-bottom: 1px solid var(--clr-border-2);
    }
    .all-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
  </style>
</head>
<body>
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo"><span class="logo-c">C</span>ineVerse</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="movies.html" class="nav-link">Movies</a></li>
        <li><a href="series.html" class="nav-link">Series</a></li>
        <li><a href="originals.html" class="nav-link">Originals</a></li>
        <li><a href="genres.html" class="nav-link active">Genres</a></li>
        <li><a href="pricing.html" class="nav-link">Pricing</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-nav btn-sign-in">Sign In</a>
        <a href="register.html" class="btn-nav btn-start">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- PROMOTED SPOTLIGHT -->
  <div id="promoted-spotlight"></div>

  <div class="page-hero">
    <div class="container">
      <div class="section-tag">🎭 Browse</div>
      <h1 class="section-title" style="margin-top:12px;">Explore by <span class="gradient-text">Genre</span></h1>
      <p class="section-sub" id="genres-sub">Pick a genre to browse your library</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="genres-grid" id="genres-grid"></div>

      <div id="genre-results-wrap" style="margin-top:60px;display:none;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;">
          <h2 class="section-title" style="font-size:1.8rem;" id="genre-heading">Browse</h2>
          <button id="clear-genre" class="btn-outline" style="padding:8px 20px;font-size:0.85rem;">Show all genres</button>
        </div>
        <div class="all-grid" id="genre-results"></div>
      </div>
    </div>
  </section>

  <footer class="footer" style="margin-top:0;">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:24px 0;">
        <p>© 2026 CineVerse Inc.</p>
        <a href="../index.html" class="btn-outline" style="padding:8px 20px;font-size:0.85rem;">← Back to Home</a>
      </div>
    </div>
  </footer>

  <script src="../js/store.js"></script>
  <script src="../js/promoted-spotlight.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/mini-player.js"></script>
  <script>
    const GENRES = [
      { name: 'Action',    icon: '💥' },
      { name: 'Drama',     icon: '🎭' },
      { name: 'Sci-Fi',    icon: '🚀' },
      { name: 'Horror',    icon: '👻' },
      { name: 'Romance',   icon: '💕' },
      { name: 'Comedy',    icon: '😂' },
      { name: 'Thriller',  icon: '🔪' },
      { name: 'Animation', icon: '✨' },
      { name: 'Fantasy',   icon: '🧙' },
      { name: 'Mystery',   icon: '🔎' },
    ];

    const ALL = CineStore.getAll();

    function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    // Build genre cards with real counts, plus any uploaded genres not in the preset list
    const uploadedGenres = new Set(ALL.map(v => (v.genre || '').trim()).filter(Boolean));
    const knownNames = new Set(GENRES.map(g => g.name.toLowerCase()));
    uploadedGenres.forEach(g => {
      if (!knownNames.has(g.toLowerCase())) GENRES.push({ name: g, icon: '🎬' });
    });

    const grid = document.getElementById('genres-grid');
    grid.innerHTML = GENRES.map(g => {
      const n = ALL.filter(v => (v.genre||'').toLowerCase() === g.name.toLowerCase()).length;
      return `
        <a href="?genre=${encodeURIComponent(g.name)}" class="genre-card" data-genre="${esc(g.name)}">
          <div class="genre-icon">${g.icon}</div>
          <h3>${esc(g.name)}</h3>
          <span>${n} ${n===1?'title':'titles'}</span>
        </a>`;
    }).join('');

    function buildCard(v) {
      const initials = (v.title || '?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
      const thumb = v.thumbUrl
        ? `<div style="width:100%;min-height:220px;background-image:url('${String(v.thumbUrl).replace(/'/g,"\\'")}');background-size:cover;background-position:center;"></div>`
        : `<div style="width:100%;min-height:220px;background:linear-gradient(145deg,${v.color||'#5a2a99'}cc,#070710);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.85);font-weight:900;font-size:2rem;">${esc(initials)}</div>`;
      const stats = CineStore.getRatingStats(v.id);
      const ratingTxt = stats.count ? `★ ${stats.avg.toFixed(1)}` : '★ —';
      return `
        <a href="watch.html?id=${encodeURIComponent(v.id)}" class="movie-card reveal visible" style="text-decoration:none;color:inherit;display:block;">
          <div class="card-thumb">
            ${thumb}
            ${v.badge ? `<div class="card-badge">${esc(v.badge)}</div>` : ''}
            ${v.promoted ? '<div class="card-badge" style="right:10px;left:auto;background:linear-gradient(135deg,#f5c518,#ff9f1c);color:#0a0612;">★ PROMOTED</div>' : ''}
            <div class="card-overlay"><div class="card-play-btn">▶</div></div>
          </div>
          <div class="card-info">
            <div class="card-title">${esc(v.title)}</div>
            <div class="card-meta">
              <span class="card-rating">${ratingTxt}</span>
              <span>·</span><span>${esc(String(v.year||''))}</span>
              <span>·</span><span>${esc(v.category||'')}</span>
            </div>
          </div>
        </a>`;
    }

    const resultsWrap = document.getElementById('genre-results-wrap');
    const resultsEl   = document.getElementById('genre-results');
    const headingEl   = document.getElementById('genre-heading');
    const subEl       = document.getElementById('genres-sub');
    const clearBtn    = document.getElementById('clear-genre');

    function showGenre(name) {
      if (!name) { resultsWrap.style.display = 'none'; return; }
      const items = ALL.filter(v => (v.genre||'').toLowerCase() === name.toLowerCase());
      headingEl.textContent = `${name} · ${items.length} ${items.length===1?'title':'titles'}`;
      subEl.textContent = `Showing ${name}`;
      if (!items.length) {
        resultsEl.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--clr-text-muted);
                      border:1px dashed var(--clr-border-2);border-radius:16px;background:rgba(255,255,255,0.02);">
            <div style="font-size:2.2rem;margin-bottom:10px;opacity:0.6;">🎬</div>
            <div style="font-weight:700;color:var(--clr-text);margin-bottom:6px;">No ${esc(name)} titles yet</div>
            <div style="font-size:0.85rem;">Upload one from the admin panel to see it here.</div>
          </div>`;
      } else {
        resultsEl.innerHTML = items.map(buildCard).join('');
      }
      resultsWrap.style.display = '';
    }

    clearBtn.addEventListener('click', () => {
      history.replaceState(null, '', location.pathname);
      resultsWrap.style.display = 'none';
      subEl.textContent = 'Pick a genre to browse your library';
    });

    const q = new URLSearchParams(location.search).get('genre');
    if (q) showGenre(q);
  </script>
</body>
</html>
