<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Originals – CineVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .page-hero {
      padding: 140px 0 60px;
      background: linear-gradient(180deg, rgba(245,197,24,0.12) 0%, transparent 100%);
      border-bottom: 1px solid var(--clr-border-2);
    }
    .all-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 22px;
    }
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--clr-text-muted);
    }
  </style>
</head>
<body>
  <nav id="navbar" class="navbar scrolled">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo"><span class="logo-c">C</span>ineVerse</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html" class="nav-link">Home</a></li>
        <li><a href="movies.html" class="nav-link">Movies</a></li>
        <li><a href="series.html" class="nav-link">Series</a></li>
        <li><a href="originals.html" class="nav-link active">Originals</a></li>
        <li><a href="genres.html" class="nav-link">Genres</a></li>
        <li><a href="pricing.html" class="nav-link">Pricing</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-nav btn-sign-in">Sign In</a>
        <a href="register.html" class="btn-nav btn-start">Get Started</a>
      </div>
    </div>
  </nav>

  <!-- PROMOTED SPOTLIGHT -->
  <div id="promoted-spotlight"></div>

  <div class="page-hero">
    <div class="container">
      <div class="section-tag">⭐ Exclusive</div>
      <h1 class="section-title" style="margin-top:12px;">CineVerse <span class="gradient-text">Originals</span></h1>
      <p class="section-sub">Stories told only here. Award-winning originals streaming exclusively on CineVerse.</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="all-grid" id="originals-grid"></div>
    </div>
  </section>

  <footer class="footer" style="margin-top:0;">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:24px 0;">
        <p>© 2026 CineVerse Inc.</p>
        <a href="../index.html" class="btn-outline" style="padding:8px 20px;font-size:0.85rem;">← Back to Home</a>
      </div>
    </div>
  </footer>

  <script src="../js/store.js"></script>
  <script src="../js/promoted-spotlight.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/mini-player.js"></script>
  <script>
    const items = CineStore.getByCategory('Originals');

    function cardHTML(item) {
      const initials = item.title.split(' ').map(w => w[0]).slice(0,2).join('');
      const isUpload = !!(CineStore.getById && CineStore.getById(item.id));
      const href = isUpload ? `watch.html?id=${encodeURIComponent(item.id)}` : '#';
      const thumb = item.thumbUrl
        ? `<div style="width:100%;min-height:260px;background-image:url('${String(item.thumbUrl).replace(/'/g,"\\'")}');background-size:cover;background-position:center;position:relative;">
             <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,0.55) 100%);"></div>
             <div style="position:absolute;bottom:10px;left:12px;font-size:0.7rem;font-weight:700;color:var(--clr-accent);letter-spacing:3px;">ORIGINAL</div>
           </div>`
        : `<div style="width:100%;min-height:260px;background:linear-gradient(145deg,${item.color}cc,#070710);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;">
             <div style="font-size:3rem;font-weight:900;color:rgba(255,255,255,0.9);">${initials}</div>
             <div style="font-size:0.7rem;font-weight:700;color:var(--clr-accent);letter-spacing:3px;">ORIGINAL</div>
           </div>`;
      const stats = CineStore.getRatingStats(item.id);
      const ratingTxt = stats.count ? `★ ${stats.avg.toFixed(1)}` : '★ —';
      return `
        <a href="${href}" class="movie-card reveal visible" data-id="${item.id}" style="text-decoration:none;color:inherit;display:block;">
          <div class="card-thumb">
            ${thumb}
            ${item.badge ? `<div class="card-badge" style="background:var(--clr-accent);color:#000;">${item.badge}</div>` : ''}
            ${item.promoted ? '<div class="card-badge" style="right:10px;left:auto;background:linear-gradient(135deg,#f5c518,#ff9f1c);color:#0a0612;">★ PROMOTED</div>' : ''}
            <div class="card-overlay"><div class="card-play-btn">▶</div></div>
          </div>
          <div class="card-info">
            <div class="card-title">${item.title}</div>
            <div class="card-meta">
              <span class="card-rating">${ratingTxt}</span>
              <span>·</span><span>${item.year}</span>
              <span>·</span><span>${item.genre}</span>
            </div>
          </div>
        </a>`;
    }

    const grid = document.getElementById('originals-grid');
    if (items.length) {
      grid.innerHTML = items.map(cardHTML).join('');
    } else {
      grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:60px 20px;
                    color:var(--clr-text-muted);border:1px dashed var(--clr-border-2);
                    border-radius:16px;background:rgba(255,255,255,0.02);">
          <div style="font-size:2.2rem;margin-bottom:10px;opacity:0.6;">⭐</div>
          <div style="font-weight:700;color:var(--clr-text);margin-bottom:6px;">No originals yet</div>
          <div style="font-size:0.85rem;">Upload originals from the admin panel to see them here.</div>
        </div>`;
    }
  </script>
</body>
</html>
