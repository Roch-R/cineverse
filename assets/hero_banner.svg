<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b2fc9;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#c44dff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1920" height="1080" fill="#070710"/>
  
  <!-- Gradient overlay -->
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="300" cy="200" r="200" fill="none" stroke="#c44dff" stroke-width="2" opacity="0.3"/>
  <circle cx="300" cy="200" r="150" fill="none" stroke="#8b2fc9" stroke-width="1" opacity="0.2"/>
  
  <circle cx="1600" cy="800" r="250" fill="none" stroke="#ff6b9d" stroke-width="2" opacity="0.3"/>
  <circle cx="1600" cy="800" r="180" fill="none" stroke="#c44dff" stroke-width="1" opacity="0.2"/>
  
  <!-- Center text -->
  <text x="960" y="450" font-family="Outfit, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">
    CINEVERSE
  </text>
  <text x="960" y="580" font-family="Outfit, sans-serif" font-size="48" fill="#e8e8f0" text-anchor="middle" opacity="0.8">
    Stream Unlimited Content
  </text>
  
  <!-- Decorative lines -->
  <line x1="600" y1="700" x2="1320" y2="700" stroke="#c44dff" stroke-width="2" opacity="0.4"/>
</svg>